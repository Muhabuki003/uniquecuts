<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Unique Cuts Barbershop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Admin styles - completely separate from main site */
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96A;
            --gold-dark: #A07830;
            --black: #0A0A0A;
            --black-mid: #141414;
            --white: #F5F0E8;
            --white-dim: rgba(245, 240, 232, 0.7);
            --error: #ff4444;
            --success: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--black-mid);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .login-box p {
            color: var(--white-dim);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--white-dim);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--gold);
            color: var(--black);
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-secondary:hover {
            background: var(--gold);
            color: var(--black);
        }

        .btn-danger {
            background: var(--error);
            color: var(--white);
        }

        .btn-danger:hover {
            background: #ff6666;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.7rem;
            width: auto;
        }

        /* Admin Dashboard */
        .admin-container {
            display: none;
            min-height: 100vh;
        }

        .admin-header {
            background: var(--black-mid);
            border-bottom: 1px solid var(--border);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.5rem;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white-dim);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            border-color: var(--gold);
            color: var(--gold);
        }

        .admin-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--white);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--black-mid);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--white-dim);
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--white-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .icon-btn.delete:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Forms */
        .form-card {
            background: var(--black-mid);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            border-radius: 4px;
            min-height: 100px;
            resize: vertical;
        }

        .form-group input[type="file"] {
            padding: 10px;
            background: var(--black);
            border: 1px dashed var(--border);
            border-radius: 4px;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--gold);
        }

        /* Hours Table */
        .hours-table {
            width: 100%;
            border-collapse: collapse;
        }

        .hours-table th,
        .hours-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .hours-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--white-dim);
            font-weight: 600;
        }

        .hours-table td {
            color: var(--white);
        }

        .hours-table input {
            width: 120px;
            padding: 8px 12px;
            background: var(--black);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 4px;
            font-family: 'Montserrat', sans-serif;
        }

        /* Services List */
        .service-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--black-mid);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .service-row:hover {
            border-color: var(--gold);
        }

        .service-info h4 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .service-info p {
            font-size: 0.85rem;
            color: var(--white-dim);
        }

        .service-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            margin: 0 20px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--black-mid);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--white);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--white-dim);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .close-btn:hover {
            color: var(--gold);
        }

        /* Messages */
        .message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .message.show {
            display: flex;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        /* Loading States */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--black-mid) 25%, var(--black) 50%, var(--black-mid) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--white-dim);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .admin-nav {
                justify-content: center;
            }

            .admin-content {
                padding: 20px;
            }

            .section-header {
                flex-direction: column;
                align-items: stretch;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .service-row {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .service-price {
                margin: 0;
            }
        }

        /* Image preview */
        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            margin-bottom: 15px;
        }

        .image-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--black);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white-dim);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h1>Admin Portal</h1>
            <p>Unique Cuts Barbershop Management</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@uniquecuts.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>
            <div class="message error" id="loginError">
                <span>Invalid credentials. Please try again.</span>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-container" id="adminDashboard">
        <header class="admin-header">
            <h1>Unique Cuts Admin</h1>
            <nav class="admin-nav">
                <button class="nav-btn active" data-section="barbers">Barbers</button>
                <button class="nav-btn" data-section="hours">Hours</button>
                <button class="nav-btn" data-section="services">Services</button>
                <button class="nav-btn btn-secondary" onclick="logout()">Logout</button>
            </nav>
        </header>

        <main class="admin-content">
            <!-- Messages -->
            <div class="message success" id="successMessage">
                <span>✓ Changes saved successfully!</span>
            </div>
            <div class="message error" id="errorMessage">
                <span>✗ Something went wrong. Please try again.</span>
            </div>

            <!-- Barbers Section -->
            <section class="section active" id="barbersSection">
                <div class="section-header">
                    <h2 class="section-title">Manage Barbers</h2>
                    <button class="btn" onclick="openBarberModal()">+ Add New Barber</button>
                </div>
                <div class="cards-grid" id="barbersGrid">
                    <!-- Barbers loaded dynamically -->
                </div>
            </section>

            <!-- Hours Section -->
            <section class="section" id="hoursSection">
                <div class="section-header">
                    <h2 class="section-title">Opening Hours</h2>
                    <button class="btn" onclick="saveHours()">Save Changes</button>
                </div>
                <div class="card">
                    <table class="hours-table">
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Open Time</th>
                                <th>Close Time</th>
                                <th>Closed</th>
                            </tr>
                        </thead>
                        <tbody id="hoursTableBody">
                            <!-- Hours loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Services Section -->
            <section class="section" id="servicesSection">
                <div class="section-header">
                    <h2 class="section-title">Services & Pricing</h2>
                    <button class="btn" onclick="openServiceModal()">+ Add Service</button>
                </div>
                <div id="servicesList">
                    <!-- Services loaded dynamically -->
                </div>
            </section>
        </main>
    </div>

    <!-- Barber Modal -->
    <div class="modal-overlay" id="barberModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="barberModalTitle">Add Barber</h3>
                <button class="close-btn" onclick="closeModal('barberModal')">&times;</button>
            </div>
            <form id="barberForm">
                <input type="hidden" id="barberId">
                <div class="form-group">
                    <div class="image-placeholder" id="barberImagePreview">
                        <span>No Image</span>
                    </div>
                    <input type="file" id="barberImage" accept="image/*" onchange="previewImage(this)">
                </div>
                <div class="form-group">
                    <label for="barberName">Full Name</label>
                    <input type="text" id="barberName" required placeholder="John Smith">
                </div>
                <div class="form-group">
                    <label for="barberTitle">Title/Role</label>
                    <input type="text" id="barberTitle" required placeholder="Master Barber">
                </div>
                <div class="form-group">
                    <label for="barberBio">Bio</label>
                    <textarea id="barberBio" placeholder="Brief description..."></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="barberActive" checked>
                    <label for="barberActive">Active (visible on site)</label>
                </div>
                <button type="submit" class="btn">Save Barber</button>
            </form>
        </div>
    </div>

    <!-- Service Modal -->
    <div class="modal-overlay" id="serviceModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="serviceModalTitle">Add Service</h3>
                <button class="close-btn" onclick="closeModal('serviceModal')">&times;</button>
            </div>
            <form id="serviceForm">
                <input type="hidden" id="serviceId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="serviceName">Service Name</label>
                        <input type="text" id="serviceName" required placeholder="Classic Haircut">
                    </div>
                    <div class="form-group">
                        <label for="servicePrice">Price ($)</label>
                        <input type="number" id="servicePrice" step="0.01" required placeholder="35.00">
                    </div>
                </div>
                <div class="form-group">
                    <label for="serviceCategory">Category</label>
                    <input type="text" id="serviceCategory" placeholder="haircut">
                </div>
                <div class="form-group">
                    <label for="serviceDescription">Description</label>
                    <textarea id="serviceDescription" placeholder="Service description..."></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="serviceActive" checked>
                    <label for="serviceActive">Active</label>
                </div>
                <button type="submit" class="btn">Save Service</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // SUPABASE CONFIGURATION - UPDATE THESE!
        // ==========================================
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key-here';
        
        // Initialize Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        
        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                showDashboard();
            }
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            btn.innerHTML = originalText;
            btn.disabled = false;

            if (error) {
                document.getElementById('loginError').classList.add('show');
                setTimeout(() => {
                    document.getElementById('loginError').classList.remove('show');
                }, 3000);
            } else {
                showDashboard();
            }
        });

        // Logout
        async function logout() {
            await supabase.auth.signOut();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminDashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadBarbers();
            loadHours();
            loadServices();
        }

        // ==========================================
        // NAVIGATION
        // ==========================================
        
        document.querySelectorAll('.nav-btn[data-section]').forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active nav
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Show section
                const section = btn.dataset.section;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(section + 'Section').classList.add('active');
            });
        });

        // ==========================================
        // BARBERS MANAGEMENT
        // ==========================================
        
        async function loadBarbers() {
            const grid = document.getElementById('barbersGrid');
            grid.innerHTML = '<div class="skeleton" style="height: 200px;"></div>'.repeat(3);

            const { data: barbers, error } = await supabase
                .from('barbers')
                .select('*')
                .order('display_order', { ascending: true });

            if (error) {
                showError('Failed to load barbers');
                return;
            }

            grid.innerHTML = barbers.map(barber => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">${barber.name}</div>
                            <div class="card-subtitle">${barber.title}</div>
                            ${!barber.is_active ? '<span style="color: var(--error); font-size: 0.75rem;">(Inactive)</span>' : ''}
                        </div>
                        <div class="card-actions">
                            <button class="icon-btn" onclick="editBarber('${barber.id}')" title="Edit">
                                ✎
                            </button>
                            <button class="icon-btn delete" onclick="deleteBarber('${barber.id}')" title="Delete">
                                🗑
                            </button>
                        </div>
                    </div>
                    ${barber.image_url ? `<img src="${barber.image_url}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">` : ''}
                    <p style="font-size: 0.9rem; color: var(--white-dim);">${barber.bio || 'No bio'}</p>
                </div>
            `).join('');
        }

        function openBarberModal(barber = null) {
            document.getElementById('barberModalTitle').textContent = barber ? 'Edit Barber' : 'Add Barber';
            document.getElementById('barberForm').reset();
            document.getElementById('barberId').value = '';
            document.getElementById('barberImagePreview').innerHTML = '<span>No Image</span>';
            document.getElementById('barberImagePreview').className = 'image-placeholder';

            if (barber) {
                document.getElementById('barberId').value = barber.id;
                document.getElementById('barberName').value = barber.name;
                document.getElementById('barberTitle').value = barber.title;
                document.getElementById('barberBio').value = barber.bio || '';
                document.getElementById('barberActive').checked = barber.is_active;
                if (barber.image_url) {
                    document.getElementById('barberImagePreview').innerHTML = `<img src="${barber.image_url}" class="image-preview">`;
                }
            }

            document.getElementById('barberModal').classList.add('active');
        }

        async function editBarber(id) {
            const { data: barber, error } = await supabase
                .from('barbers')
                .select('*')
                .eq('id', id)
                .single();

            if (error) {
                showError('Failed to load barber');
                return;
            }

            openBarberModal(barber);
        }

        document.getElementById('barberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('barberId').value;
            const name = document.getElementById('barberName').value;
            const title = document.getElementById('barberTitle').value;
            const bio = document.getElementById('barberBio').value;
            const is_active = document.getElementById('barberActive').checked;

            let image_url = null;
            const fileInput = document.getElementById('barberImage');
            
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;

                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('barber-images')
                    .upload(fileName, file);

                if (uploadError) {
                    showError('Failed to upload image');
                    return;
                }

                const { data: { publicUrl } } = supabase.storage
                    .from('barber-images')
                    .getPublicUrl(fileName);

                image_url = publicUrl;
            }

            const barberData = {
                name,
                title,
                bio,
                is_active,
                updated_at: new Date().toISOString()
            };

            if (image_url) barberData.image_url = image_url;

            let result;
            if (id) {
                result = await supabase
                    .from('barbers')
                    .update(barberData)
                    .eq('id', id);
            } else {
                barberData.display_order = await getNextOrder('barbers');
                result = await supabase
                    .from('barbers')
                    .insert([barberData]);
            }

            if (result.error) {
                showError('Failed to save barber');
                return;
            }

            closeModal('barberModal');
            showSuccess('Barber saved successfully!');
            loadBarbers();
        });

        async function deleteBarber(id) {
            if (!confirm('Are you sure you want to delete this barber?')) return;

            const { error } = await supabase
                .from('barbers')
                .delete()
                .eq('id', id);

            if (error) {
                showError('Failed to delete barber');
                return;
            }

            showSuccess('Barber deleted successfully!');
            loadBarbers();
        }

        // ==========================================
        // HOURS MANAGEMENT
        // ==========================================
        
        async function loadHours() {
            const { data: hours, error } = await supabase
                .from('opening_hours')
                .select('*')
                .order('day_of_week', { ascending: true });

            if (error) {
                showError('Failed to load hours');
                return;
            }

            const tbody = document.getElementById('hoursTableBody');
            tbody.innerHTML = hours.map(h => `
                <tr data-id="${h.id}">
                    <td><strong>${h.day_name}</strong></td>
                    <td><input type="text" class="open-time" value="${h.open_time}" ${h.is_closed ? 'disabled' : ''}></td>
                    <td><input type="text" class="close-time" value="${h.close_time}" ${h.is_closed ? 'disabled' : ''}></td>
                    <td>
                        <input type="checkbox" class="is-closed" ${h.is_closed ? 'checked' : ''} 
                            onchange="toggleHours(this)">
                    </td>
                </tr>
            `).join('');
        }

        function toggleHours(checkbox) {
            const row = checkbox.closest('tr');
            const inputs = row.querySelectorAll('.open-time, .close-time');
            inputs.forEach(input => input.disabled = checkbox.checked);
        }

        async function saveHours() {
            const rows = document.querySelectorAll('#hoursTableBody tr');
            const updates = [];

            rows.forEach(row => {
                updates.push({
                    id: row.dataset.id,
                    open_time: row.querySelector('.open-time').value,
                    close_time: row.querySelector('.close-time').value,
                    is_closed: row.querySelector('.is-closed').checked
                });
            });

            const { error } = await supabase
                .from('opening_hours')
                .upsert(updates);

            if (error) {
                showError('Failed to save hours');
                return;
            }

            showSuccess('Hours updated successfully!');
        }

        // ==========================================
        // SERVICES MANAGEMENT
        // ==========================================
        
        async function loadServices() {
            const { data: services, error } = await supabase
                .from('services')
                .select('*')
                .order('display_order', { ascending: true });

            if (error) {
                showError('Failed to load services');
                return;
            }

            const container = document.getElementById('servicesList');
            container.innerHTML = services.map(s => `
                <div class="service-row">
                    <div class="service-info">
                        <h4>${s.service_name}</h4>
                        <p>${s.description || s.category}</p>
                        ${!s.is_active ? '<span style="color: var(--error); font-size: 0.75rem;">(Inactive)</span>' : ''}
                    </div>
                    <div class="service-price">$${s.price}</div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="editService('${s.id}')" title="Edit">
                            ✎
                        </button>
                        <button class="icon-btn delete" onclick="deleteService('${s.id}')" title="Delete">
                            🗑
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openServiceModal(service = null) {
            document.getElementById('serviceModalTitle').textContent = service ? 'Edit Service' : 'Add Service';
            document.getElementById('serviceForm').reset();
            document.getElementById('serviceId').value = '';

            if (service) {
                document.getElementById('serviceId').value = service.id;
                document.getElementById('serviceName').value = service.service_name;
                document.getElementById('servicePrice').value = service.price;
                document.getElementById('serviceCategory').value = service.category || '';
                document.getElementById('serviceDescription').value = service.description || '';
                document.getElementById('serviceActive').checked = service.is_active;
            }

            document.getElementById('serviceModal').classList.add('active');
        }

        async function editService(id) {
            const { data: service, error } = await supabase
                .from('services')
                .select('*')
                .eq('id', id)
                .single();

            if (error) {
                showError('Failed to load service');
                return;
            }

            openServiceModal(service);
        }

        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('serviceId').value;
            
            const serviceData = {
                service_name: document.getElementById('serviceName').value,
                price: parseFloat(document.getElementById('servicePrice').value),
                category: document.getElementById('serviceCategory').value,
                description: document.getElementById('serviceDescription').value,
                is_active: document.getElementById('serviceActive').checked,
                updated_at: new Date().toISOString()
            };

            let result;
            if (id) {
                result = await supabase
                    .from('services')
                    .update(serviceData)
                    .eq('id', id);
            } else {
                serviceData.display_order = await getNextOrder('services');
                result = await supabase
                    .from('services')
                    .insert([serviceData]);
            }

            if (result.error) {
                showError('Failed to save service');
                return;
            }

            closeModal('serviceModal');
            showSuccess('Service saved successfully!');
            loadServices();
        });

        async function deleteService(id) {
            if (!confirm('Are you sure you want to delete this service?')) return;

            const { error } = await supabase
                .from('services')
                .delete()
                .eq('id', id);

            if (error) {
                showError('Failed to delete service');
                return;
            }

            showSuccess('Service deleted successfully!');
            loadServices();
        }

        // ==========================================
        // UTILITIES
        // ==========================================
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.querySelector('span').textContent = '✓ ' + message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.querySelector('span').textContent = '✗ ' + message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        async function getNextOrder(table) {
            const { data } = await supabase
                .from(table)
                .select('display_order')
                .order('display_order', { ascending: false })
                .limit(1);
            
            return (data?.[0]?.display_order || 0) + 1;
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('barberImagePreview').innerHTML = 
                        `<img src="${e.target.result}" class="image-preview">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Initialize
        checkSession();
    </script>
</body>
</html>
